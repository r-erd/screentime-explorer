name: Build & Release

on:
  push:
    branches: [main]
    tags:     ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run build
        env:
          # Disable code-signing for CI builds
          # (packaged app requires right-click > Open on first launch)
          CI: true

      - name: Upload app bundle (every build)
        uses: actions/upload-artifact@v4
        with:
          name: Screenlog-${{ github.sha }}
          path: src-tauri/target/release/bundle/macos/Screenlog.app
          retention-days: 14

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: macos-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run build
        env:
          CI: true

      - name: Zip app bundle
        run: |
          cd src-tauri/target/release/bundle/macos
          zip -r --symlinks "Screenlog-${{ github.ref_name }}.zip" Screenlog.app
          echo "ZIP_PATH=$(pwd)/Screenlog-${{ github.ref_name }}.zip" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_PATH }}
          generate_release_notes: true
          body: |
            ## Install

            1. Download `Screenlog-${{ github.ref_name }}.zip` below and unzip it.
            2. Move **Screenlog.app** to your Applications folder.
            3. On first launch, right-click → **Open** (required once because the app is not notarised).
            4. Grant **Full Disk Access** in System Settings → Privacy & Security when prompted.

            > **Note:** This build is unsigned. macOS Gatekeeper will warn you once; after clicking Open it will launch normally.
