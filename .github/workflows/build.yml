name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: macos-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app + DMG
        run: npm run build -- --bundles app,dmg
        env:
          CI: true

      - name: Rename DMG
        run: |
          DMG=$(find src-tauri/target/release/bundle/dmg -name "*.dmg" | head -1)
          NEW="src-tauri/target/release/bundle/dmg/Screenlog-${{ github.ref_name }}.dmg"
          mv "$DMG" "$NEW"
          echo "DMG_PATH=$NEW" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.DMG_PATH }}
          generate_release_notes: true
          body: |
            ## Install

            1. Download `Screenlog-${{ github.ref_name }}.dmg` below.
            2. Open the DMG, drag **Screenlog.app** to your Applications folder.
            3. On first launch, right-click → **Open** (required once because the app is not notarised).
            4. Grant **Full Disk Access** in System Settings → Privacy & Security when prompted.

            > **Note:** This build is unsigned. macOS Gatekeeper will warn you once; after clicking Open it will launch normally.
